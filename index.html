<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CV de Maugane De Carheil</title>
  <style>
    :root { --maxw: 980px; }
    html, body { margin: 0; padding: 0; background: #fafafa; font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; color: #0f172a; }
    header { position: sticky; top: 0; z-index: 10; background: white; border-bottom: 1px solid #e5e7eb; }
    .bar { max-width: var(--maxw); margin: 0 auto; padding: .8rem 1rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem; }
    .title { font-weight: 700; font-size: 1rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .btn { display: inline-block; padding: .6rem 1rem; border-radius: 10px; border: 1px solid #e5e7eb; background: #f8fafc; text-decoration: none; font-weight: 600; color: inherit; }
    .btn:hover { background: #f1f5f9; }
    main { max-width: var(--maxw); margin: 1rem auto 3rem; padding: 0 1rem; }
    .page { background: white; border-radius: 12px; margin: 1rem auto; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,.06), 0 2px 6px rgba(0,0,0,.04); }
    .page img { display: block; width: 100%; height: auto; }
    footer { text-align: center; color: #64748b; font-size: .9rem; padding: 2rem 1rem 3rem; }
    .bottom-actions { margin-top: 1rem; }
  </style>
</head>
<body>
  <header>
    <div class="bar">
      <div class="title">Mon Cv</div>
      <div class="actions">
        <a class="btn" href="document.pdf" download>Télécharger le CV</a>
      </div>
    </div>
  </header>
  <main>
    <div class="page"><img src="pdf_images/page-01.png" alt="Page 1" loading="lazy"></div>
    <div class="bottom-actions" style="text-align:center;">
      <a class="btn" href="document.pdf" download>Télécharger le CV</a>
    </div>
  </main>
  <footer>
    Page web générée par TAKE A SITE - 
  </footer>
</body>
</html>
